<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Golden Anchor — Landing (chosen direction)</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;1,6..72,400;1,6..72,500&family=Source+Serif+4:ital,wght@0,400;0,500;1,400&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
  * { box-sizing:border-box; }
  html,body { margin:0; padding:0; }
  body { font-family:'Plus Jakarta Sans',system-ui,sans-serif; }
  @keyframes ga-rise { from { opacity:0; transform:translateY(14px); } to { opacity:1; transform:translateY(0); } }
  .ga-rise { animation:ga-rise 620ms cubic-bezier(0.2,0.8,0.2,1) both; }
  .ga-card { transition:transform 200ms cubic-bezier(0.2,0.8,0.2,1), box-shadow 200ms ease; }
  .ga-card:hover { transform:translateY(-3px); }
  .ga-btn { transition:transform 150ms cubic-bezier(0.2,0.8,0.2,1), box-shadow 150ms ease, filter 150ms ease; }
  .ga-btn:hover { transform:translateY(-1px); filter:brightness(1.04); }
  .ga-btn:active { transform:translateY(0); }
  @media (prefers-reduced-motion: reduce) { .ga-rise{animation:none!important;} .ga-card,.ga-btn{transition:none!important;} }
  @media (max-width:860px) {
    .ga-hero { grid-template-columns:1fr !important; gap:28px !important; }
    .ga-signin-wrap { justify-content:flex-start !important; }
    .ga-hero h1 { font-size:clamp(2.1rem,9vw,3rem) !important; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

/* CHOSEN DIRECTION (2026-06-06):
   Dark  = A1 dark  (navy + cream-gold)
   Light = A2 light (warm ivory + deeper gold)
   Layout C1 (hero-left + corner sign-in) · Background B2 (generative gold flow-field) */
const THEME = {
  dark:  { bg:"#0D1B2A", bg2:"#142235", text:"#F1F5F9", textHi:"#EDD594", muted:"#CBD5E1",
           card:"#131F31", border:"#1F2937", gold:"#C9A84C", goldText:"#EDD594", inp:"#0D1B2A",
           glowA:"rgba(201,168,76,0.18)", glowB:"rgba(45,80,140,0.22)" },
  light: { bg:"#F4F1E9", bg2:"#ECE6D6", text:"#10233A", textHi:"#10233A", muted:"#54606E",
           card:"#FFFFFF", border:"#DED6C4", gold:"#B8901E", goldText:"#7A5A12", inp:"#FFFFFF",
           glowA:"rgba(184,144,30,0.16)", glowB:"rgba(16,35,58,0.06)" },
};
const BTN_INK = "#1A1208"; // dark ink on gold — a11y-verified (white fails)

const Icon = ({ name, c }) => {
  const common = { width:24, height:24, viewBox:"0 0 24 24", fill:"none", stroke:c, strokeWidth:1.6, strokeLinecap:"round", strokeLinejoin:"round" };
  if (name==="flow")   return <svg {...common}><path d="M3 7h4c4 0 4 10 8 10h6"/><path d="M3 17h4c4 0 4-10 8-10h6"/></svg>;
  if (name==="gauge")  return <svg {...common}><path d="M12 14l4-4"/><path d="M3.3 17a9 9 0 1 1 17.4 0"/><circle cx="12" cy="14" r="1.2" fill={c} stroke="none"/></svg>;
  if (name==="report") return <svg {...common}><path d="M14 3v5h5"/><path d="M19 8v11a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h7z"/><path d="M9 13h6M9 17h4"/></svg>;
  return null;
};
const AnchorMark = ({ c }) => (
  <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
    <circle cx="12" cy="5" r="2.2"/><path d="M12 7.2V21"/><path d="M5 13a7 7 0 0 0 14 0"/><path d="M5 13H3M19 13h2"/>
  </svg>
);

function FlowField({ pal }) {
  const ref = useRef(null);
  useEffect(() => {
    const c = ref.current; if (!c) return;
    const ctx = c.getContext("2d");
    let raf, t = 0, alive = true;
    const reduce = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
    const DPR = Math.min(2, window.devicePixelRatio || 1);
    const resize = () => { c.width = c.clientWidth*DPR; c.height = c.clientHeight*DPR; };
    resize(); window.addEventListener("resize", resize);
    const N = 560;
    const pts = Array.from({length:N}, () => ({ x:Math.random(), y:Math.random() }));
    const render = () => {
      const W=c.width, H=c.height;
      ctx.fillStyle = pal.bg; ctx.fillRect(0,0,W,H);
      ctx.globalCompositeOperation = "lighter";
      for (const p of pts) {
        const a = (Math.sin((p.x*3.1+t*0.0006))*Math.cos((p.y*2.7-t*0.0005)))*Math.PI*2;
        p.x += Math.cos(a)*0.0011; p.y += Math.sin(a)*0.0011;
        if (p.x<0)p.x+=1; if(p.x>1)p.x-=1; if(p.y<0)p.y+=1; if(p.y>1)p.y-=1;
        const g = Math.abs(Math.sin(a));
        ctx.fillStyle = `rgba(201,168,76,${0.05+g*0.11})`;
        ctx.fillRect(p.x*W, p.y*H, DPR*1.4, DPR*1.4);
      }
      ctx.globalCompositeOperation = "source-over";
      // draw once if reduced motion, else animate
      if (!reduce && alive) { t+=16; raf=requestAnimationFrame(render); }
    };
    if (reduce) { // settle to a static frame
      for (let i=0;i<240;i++){ t+=16; for(const p of pts){const a=(Math.sin((p.x*3.1+t*0.0006))*Math.cos((p.y*2.7-t*0.0005)))*Math.PI*2;p.x+=Math.cos(a)*0.0011;p.y+=Math.sin(a)*0.0011;if(p.x<0)p.x+=1;if(p.x>1)p.x-=1;if(p.y<0)p.y+=1;if(p.y>1)p.y-=1;} }
      render();
    } else render();
    return () => { alive=false; cancelAnimationFrame(raf); window.removeEventListener("resize", resize); };
  }, [pal]);
  return <canvas ref={ref} style={{position:"absolute",inset:0,width:"100%",height:"100%",opacity:0.6,pointerEvents:"none"}}/>;
}

function SignInCard({ p }) {
  const inp = { background:p.inp, border:`1px solid ${p.border}`, color:p.text, borderRadius:10, padding:"11px 12px", fontSize:13, outline:"none", width:"100%", boxSizing:"border-box", fontFamily:"inherit" };
  const lbl = { fontSize:10, color:p.muted, display:"block", marginBottom:6, letterSpacing:"0.06em", textTransform:"uppercase", fontWeight:600 };
  return (
    <div className="ga-card ga-rise" style={{ background:p.card, border:`1px solid ${p.border}`, borderRadius:18, padding:26, boxShadow:`0 24px 60px ${p.gold}1f, 0 4px 12px ${p.gold}14`, position:"relative", maxWidth:380, width:"100%", animationDelay:"120ms" }}>
      <div style={{position:"absolute",top:0,left:0,right:0,height:3,background:`linear-gradient(90deg,${p.gold},${p.goldText})`,borderTopLeftRadius:18,borderTopRightRadius:18}}/>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:18}}>
        <h2 style={{fontFamily:"'Newsreader',serif",fontStyle:"italic",fontWeight:500,fontSize:22,color:p.textHi,margin:0}}>Sign In</h2>
        <span style={{fontSize:9,color:p.muted,letterSpacing:"0.12em",textTransform:"uppercase",fontWeight:600}}>Secure portal</span>
      </div>
      <div style={{marginBottom:14}}><label style={lbl}>Email</label><input style={inp} placeholder="you@email.com"/></div>
      <div style={{marginBottom:16}}><label style={lbl}>Password</label><input type="password" style={inp} placeholder="••••••••"/></div>
      <button className="ga-btn" style={{width:"100%",padding:"14px 16px",minHeight:48,borderRadius:10,fontWeight:700,fontSize:13,cursor:"pointer",
        background:p.gold,color:BTN_INK,border:"none",letterSpacing:"0.04em",textTransform:"uppercase",boxShadow:`0 6px 18px ${p.gold}44`}}>Sign In</button>
      <div style={{textAlign:"center",marginTop:14}}><a style={{color:p.muted,fontSize:12,textDecoration:"underline",cursor:"pointer"}}>Forgot password?</a></div>
      <div style={{marginTop:16,paddingTop:14,borderTop:`1px solid ${p.border}`,fontSize:10,color:p.muted,textAlign:"center"}}>
        No account yet? <a style={{color:p.goldText,fontWeight:600,textDecoration:"none",cursor:"pointer"}}>Contact Mauricio</a>
      </div>
    </div>
  );
}

const FEATURES = [
  { icon:"flow",   title:"Where every dollar goes", body:"A live Sankey diagram shows how income flows into bills, debt, and savings — at a glance." },
  { icon:"gauge",  title:"Health, scored at a glance", body:"DSR, savings rate, and emergency-fund months as live gauges. Clear targets, no jargon." },
  { icon:"report", title:"Reports that look like reports", body:"Designer-grade PDF — every section on its own page. Ready to review or share with confidence." },
];

function Landing({ mode, setMode }) {
  const p = THEME[mode];
  return (
    <div style={{minHeight:"100vh",background:p.bg,color:p.text,position:"relative",overflowX:"hidden",fontFamily:"'Plus Jakarta Sans',system-ui,sans-serif"}}>
      <div aria-hidden style={{position:"absolute",inset:0,zIndex:0,pointerEvents:"none"}}>
        <FlowField pal={p}/>
        <div style={{position:"absolute",top:-200,right:-150,width:500,height:500,borderRadius:"50%",background:`radial-gradient(circle,${p.glowA},transparent 70%)`,filter:"blur(40px)"}}/>
        <div style={{position:"absolute",top:300,left:-200,width:600,height:600,borderRadius:"50%",background:`radial-gradient(circle,${p.glowB},transparent 70%)`,filter:"blur(50px)"}}/>
      </div>

      <div style={{position:"relative",zIndex:2}}>
        <header style={{padding:"22px 36px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div style={{display:"flex",alignItems:"center",gap:12}}>
            <AnchorMark c={p.goldText}/>
            <div>
              <div style={{fontFamily:"'Newsreader',serif",fontStyle:"italic",fontWeight:500,fontSize:18,color:p.goldText,letterSpacing:"0.12em",textTransform:"uppercase",lineHeight:1}}>Golden Anchor</div>
              <div style={{fontSize:9,color:p.muted,letterSpacing:"0.22em",marginTop:3,textTransform:"uppercase",fontWeight:500}}>Financial Advisory</div>
            </div>
          </div>
          <button onClick={()=>setMode(mode==="dark"?"light":"dark")} aria-label="Toggle theme"
            style={{fontSize:12,padding:"11px 18px",minHeight:44,borderRadius:99,background:"transparent",color:p.muted,border:`1px solid ${p.border}`,cursor:"pointer",fontWeight:600,letterSpacing:"0.04em"}}>
            {mode==="dark"?"Light":"Dark"}
          </button>
        </header>

        <section className="ga-hero" style={{maxWidth:1200,margin:"0 auto",padding:"40px 36px 60px",display:"grid",gridTemplateColumns:"minmax(0,1.4fr) minmax(0,1fr)",gap:48,alignItems:"start"}}>
          <div className="ga-rise" style={{paddingTop:36}}>
            <div style={{fontSize:10,fontFamily:"'JetBrains Mono',monospace",color:p.goldText,letterSpacing:"0.2em",textTransform:"uppercase",marginBottom:18,fontWeight:600}}>● Financial coaching platform</div>
            <h1 style={{fontFamily:"'Newsreader',serif",fontStyle:"italic",fontWeight:500,fontSize:"clamp(2.4rem,5.5vw,4.2rem)",color:p.textHi,lineHeight:1.05,letterSpacing:"-0.01em",margin:"0 0 22px"}}>
              The dashboard your <span style={{color:p.goldText}}>advisor</span> brings to every meeting.
            </h1>
            <p style={{fontFamily:"'Source Serif 4',serif",fontSize:17,lineHeight:1.6,color:p.text,maxWidth:520,margin:"0 0 28px"}}>
              A complete picture of your income, bills, debt, and savings — updated each session and summarized in a monthly report.
            </p>
            <div style={{display:"flex",gap:10,flexWrap:"wrap",fontSize:13,color:p.goldText,fontWeight:700}}>
              {["Monthly snapshot","Debt & cash-flow models","Public intake form","EN · ES"].map((s,i)=>(
                <span key={i} style={{padding:"6px 14px",border:`1px solid ${p.gold}55`,borderRadius:99,background:`${p.gold}1A`}}>{s}</span>
              ))}
            </div>
          </div>
          <div className="ga-signin-wrap" style={{display:"flex",justifyContent:"flex-end"}}><SignInCard p={p}/></div>
        </section>

        <section style={{maxWidth:1200,margin:"0 auto",padding:"40px 36px",display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(260px,1fr))",gap:18}}>
          {FEATURES.map((f,i)=>(
            <div key={i} className="ga-card" style={{background:p.card,border:`1px solid ${p.border}`,borderRadius:14,padding:24,boxShadow:`0 2px 6px ${p.gold}14`}}>
              <div style={{width:44,height:44,borderRadius:11,display:"flex",alignItems:"center",justifyContent:"center",background:`${p.gold}1A`,border:`1px solid ${p.gold}33`,marginBottom:14}}>
                <Icon name={f.icon} c={p.gold}/>
              </div>
              <h3 style={{fontFamily:"'Newsreader',serif",fontStyle:"italic",fontWeight:500,fontSize:19,color:p.textHi,margin:"0 0 8px"}}>{f.title}</h3>
              <p style={{fontFamily:"'Source Serif 4',serif",fontSize:14,lineHeight:1.6,color:p.text,margin:0}}>{f.body}</p>
            </div>
          ))}
        </section>

        <footer style={{maxWidth:1200,margin:"40px auto 0",padding:"24px 36px 36px",borderTop:`1px solid ${p.border}`,display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:16}}>
          <div style={{fontSize:11,color:p.muted,lineHeight:1.6,fontStyle:"italic",fontFamily:"'Source Serif 4',serif",maxWidth:640}}>
            Educational financial coaching — not investment, tax, or legal advice.
          </div>
          <div style={{display:"flex",gap:14,fontSize:11,fontWeight:600,letterSpacing:"0.04em",textTransform:"uppercase"}}>
            <a href="#" style={{color:p.goldText,textDecoration:"none"}}>Email</a>
            <a href="#" style={{color:p.goldText,textDecoration:"none"}}>Site</a>
          </div>
        </footer>
      </div>
    </div>
  );
}

function App() {
  const [mode, setMode] = useState(() => localStorage.getItem("ga-landing-mode") || "dark");
  useEffect(() => { localStorage.setItem("ga-landing-mode", mode); }, [mode]);
  return <Landing mode={mode} setMode={setMode}/>;
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
