<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Golden Anchor — Landing (modern)</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Newsreader:ital,opsz,wght@1,6..72,400;1,6..72,500&display=swap" rel="stylesheet"/>
<style>
  *{box-sizing:border-box;} html,body{margin:0;padding:0;} body{font-family:'Plus Jakarta Sans',system-ui,sans-serif;-webkit-font-smoothing:antialiased;}
  .lbl{font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:0.14em;}
  @keyframes rise{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
  .rise{animation:rise 620ms cubic-bezier(0.23,1,0.32,1) both;}
  .card{transition:transform 220ms cubic-bezier(0.23,1,0.32,1),border-color 220ms ease;}
  .card:hover{transform:translateY(-3px);}
  .btn{transition:transform 150ms cubic-bezier(0.23,1,0.32,1),filter 150ms ease;}
  .btn:hover{filter:brightness(1.05);} .btn:active{transform:scale(0.97);}
  .tog{transition:transform 150ms cubic-bezier(0.23,1,0.32,1);} .tog:active{transform:scale(0.96);}
  @media (prefers-reduced-motion:reduce){.rise{animation:none!important;}*{transition:none!important;}}
  @media (max-width:880px){ .hero{grid-template-columns:1fr !important;gap:30px !important;} .anno{display:none !important;} .hero h1{font-size:clamp(2.3rem,10vw,3.2rem) !important;} }
  ::placeholder{opacity:0.7;}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

const THEME = {
  dark: { bg:"#0A0C10", glowA:"rgba(203,168,90,0.12)", glowB:"rgba(60,110,120,0.10)",
          card:"rgba(255,255,255,0.045)", border:"rgba(255,255,255,0.09)", text:"#EDEFF2", muted:"#9AA3AF", dim:"#626B78",
          gold:"#CBA85A", accent:"#E2C375", inp:"rgba(255,255,255,0.05)", blur:"blur(16px)", shadow:"none", line:[203,168,90] },
  light:{ bg:"#FAFAF7", glowA:"rgba(184,144,30,0.08)", glowB:"rgba(60,110,120,0.05)",
          card:"#FFFFFF", border:"#ECEAE3", text:"#16181C", muted:"#5A6270", dim:"#9AA0A8",
          gold:"#B8901E", accent:"#8A6B1E", inp:"#FFFFFF", blur:"blur(0px)", shadow:"0 1px 2px rgba(20,20,16,0.04), 0 12px 34px rgba(20,20,16,0.04)", line:[150,116,40] },
};
const BTN_INK = "#1A1208";
const glass = p => ({ background:p.card, border:`1px solid ${p.border}`, backdropFilter:p.blur, WebkitBackdropFilter:p.blur, boxShadow:p.shadow });

const T = {
  en:{ advisory:"Financial Advisory", eyebrow:"Financial coaching platform",
       h1a:"The dashboard your ", h1accent:"advisor", h1b:" brings to every meeting.",
       sub:"A complete picture of your income, bills, debt, and savings — updated each session and summarized in a monthly report.",
       tags:["Monthly snapshot","Debt & cash-flow models","Public intake","EN · ES"], anno:"Miami · Bilingual · Educational",
       signIn:"Sign in", securePortal:"Secure portal", email:"Email", password:"Password", forgot:"Forgot password?",
       noAccount:"No account yet?", contact:"Contact Mauricio", light:"Light", dark:"Dark",
       features:[
         {icon:"flow",  t:"Where every dollar goes", b:"A live flow shows income moving into bills, debt, and savings — at a glance."},
         {icon:"gauge", t:"Health, scored", b:"Debt ratio, savings rate, and emergency-fund months as clear targets — no jargon."},
         {icon:"report",t:"Reports that look like reports", b:"A designer-grade PDF, each section on its own page. Ready to review or share."},
       ],
       disclaimer:"Educational financial coaching — not investment, tax, or legal advice." },
  es:{ advisory:"Asesoría Financiera", eyebrow:"Plataforma de asesoría financiera",
       h1a:"El tablero que tu ", h1accent:"asesor", h1b:" lleva a cada reunión.",
       sub:"Una imagen completa de tus ingresos, gastos, deudas y ahorros — actualizada en cada sesión y resumida en un reporte mensual.",
       tags:["Resumen mensual","Modelos de deuda y flujo","Admisión","EN · ES"], anno:"Miami · Bilingüe · Educativo",
       signIn:"Iniciar sesión", securePortal:"Portal seguro", email:"Correo", password:"Contraseña", forgot:"¿Olvidaste tu contraseña?",
       noAccount:"¿Sin cuenta?", contact:"Contacta a Mauricio", light:"Claro", dark:"Oscuro",
       features:[
         {icon:"flow",  t:"A dónde va cada dólar", b:"Un flujo en vivo muestra el ingreso moviéndose hacia gastos, deuda y ahorro — al instante."},
         {icon:"gauge", t:"Salud, medida", b:"Razón de deuda, tasa de ahorro y meses de fondo de emergencia como metas claras — sin jerga."},
         {icon:"report",t:"Reportes que parecen reportes", b:"Un PDF de calidad profesional, cada sección en su página. Listo para revisar o compartir."},
       ],
       disclaimer:"Asesoría financiera educativa — no constituye asesoría de inversión, fiscal, o legal." },
};

const Icon = ({ name, c, s=18 }) => {
  const P = { width:s, height:s, viewBox:"0 0 24 24", fill:"none", stroke:c, strokeWidth:1.4, strokeLinecap:"round", strokeLinejoin:"round" };
  if(name==="flow")   return <svg {...P}><path d="M3 7h4c4 0 4 10 8 10h6"/><path d="M3 17h4c4 0 4-10 8-10h6"/></svg>;
  if(name==="gauge")  return <svg {...P}><path d="M12 14l4-4"/><path d="M3.3 17a9 9 0 1 1 17.4 0"/><circle cx="12" cy="14" r="1" fill={c} stroke="none"/></svg>;
  if(name==="report") return <svg {...P}><path d="M14 3v5h5"/><path d="M19 8v11a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h7z"/><path d="M9 13h6M9 17h4"/></svg>;
  if(name==="anchor") return <svg {...P}><circle cx="12" cy="5" r="2.2"/><path d="M12 7.2V21"/><path d="M5 13a7 7 0 0 0 14 0"/><path d="M5 13H3M19 13h2"/></svg>;
  return null;
};

/* Reactive gold line-field — thinner for the modern language. */
function LineField({ pal, dark }) {
  const ref = useRef(null);
  useEffect(() => {
    const c = ref.current; if (!c) return;
    const ctx = c.getContext("2d");
    const reduce = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
    const DPR = Math.min(2, window.devicePixelRatio || 1);
    const E = { friction:0.5, trails:48, size:38, dampening:0.025, tension:0.99 };
    const pos = { x:0, y:0 };
    let lines=[], raf, running=true, phase=1.3, drift=0, lastMoveT=-1e9;
    const resize=()=>{ c.width=c.clientWidth*DPR; c.height=c.clientHeight*DPR; pos.x=c.width*0.64; pos.y=c.height*0.42; };
    const Node=function(){ this.x=pos.x; this.y=pos.y; this.vx=0; this.vy=0; };
    const build=()=>{ lines=[]; for(let i=0;i<E.trails;i++){ const l={spring:0.4+(i/E.trails)*0.025, friction:E.friction+(Math.random()*0.01-0.005), nodes:[]}; for(let j=0;j<E.size;j++) l.nodes.push(new Node()); lines.push(l);} };
    const upd=(l)=>{ let e=l.spring,t=l.nodes[0]; t.vx+=(pos.x-t.x)*e; t.vy+=(pos.y-t.y)*e;
      for(let i=0;i<l.nodes.length;i++){ t=l.nodes[i]; if(i>0){ const n=l.nodes[i-1]; t.vx+=(n.x-t.x)*e; t.vy+=(n.y-t.y)*e; t.vx+=n.vx*E.dampening; t.vy+=n.vy*E.dampening; } t.vx*=l.friction; t.vy*=l.friction; t.x+=t.vx; t.y+=t.vy; e*=E.tension; } };
    const draw=(l)=>{ ctx.beginPath(); ctx.moveTo(l.nodes[0].x,l.nodes[0].y); let i;
      for(i=1;i<l.nodes.length-2;i++){ const a=l.nodes[i],b=l.nodes[i+1]; ctx.quadraticCurveTo(a.x,a.y,(a.x+b.x)/2,(a.y+b.y)/2);} const a=l.nodes[i],b=l.nodes[i+1]; ctx.quadraticCurveTo(a.x,a.y,b.x,b.y); ctx.stroke(); };
    const render=()=>{ if(!running)return;
      if(performance.now()-lastMoveT>1200){ drift+=0.01; pos.x=c.width*(0.62+0.26*Math.sin(drift*0.7)); pos.y=c.height*(0.42+0.22*Math.cos(drift*0.9)); }
      ctx.globalCompositeOperation="source-over"; ctx.clearRect(0,0,c.width,c.height);
      phase+=0.0016; const sh=0.5+Math.sin(phase)*0.5;
      ctx.globalCompositeOperation=dark?"lighter":"source-over";
      const a=dark?(0.05+sh*0.06):(0.09+sh*0.09);
      ctx.strokeStyle=`rgba(${pal.line[0]},${pal.line[1]},${pal.line[2]},${a})`;
      ctx.lineWidth=DPR*(dark?6:4.5);
      for(const l of lines){ upd(l); draw(l); }
      raf=requestAnimationFrame(render);
    };
    const move=(e)=>{ lastMoveT=performance.now(); const r=c.getBoundingClientRect(); const cx=e.touches?e.touches[0].clientX:e.clientX, cy=e.touches?e.touches[0].clientY:e.clientY; pos.x=(cx-r.left)*DPR; pos.y=(cy-r.top)*DPR; };
    const onR=()=>{ resize(); build(); };
    resize(); build(); window.addEventListener("resize", onR);
    if(reduce){ for(let k=0;k<70;k++) for(const l of lines) upd(l); ctx.globalCompositeOperation=dark?"lighter":"source-over"; ctx.strokeStyle=`rgba(${pal.line[0]},${pal.line[1]},${pal.line[2]},${dark?0.06:0.09})`; ctx.lineWidth=DPR*5; for(const l of lines) draw(l); }
    else { window.addEventListener("mousemove", move); window.addEventListener("touchmove", move, {passive:true}); render(); }
    return ()=>{ running=false; cancelAnimationFrame(raf); window.removeEventListener("resize", onR); window.removeEventListener("mousemove", move); window.removeEventListener("touchmove", move); };
  }, [pal, dark]);
  return <canvas ref={ref} style={{position:"absolute",inset:0,width:"100%",height:"100%",pointerEvents:"none"}}/>;
}

function SignInCard({ p, t }) {
  const inp = { background:p.inp, border:`1px solid ${p.border}`, color:p.text, borderRadius:11, padding:"11px 13px", fontSize:13, outline:"none", width:"100%", boxSizing:"border-box", fontFamily:"inherit" };
  const lbl = { fontSize:9.5, color:p.dim, display:"block", marginBottom:7, fontWeight:500 };
  return (
    <div className="card rise" style={{ ...glass(p), borderRadius:18, padding:26, position:"relative", maxWidth:380, width:"100%", animationDelay:"120ms" }}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
        <h2 style={{fontWeight:600,fontSize:19,color:p.text,margin:0,letterSpacing:"-0.01em"}}>{t.signIn}</h2>
        <span className="lbl" style={{fontSize:8.5,color:p.dim,fontWeight:500}}>{t.securePortal}</span>
      </div>
      <div style={{marginBottom:14}}><label className="lbl" style={lbl}>{t.email}</label><input style={inp} placeholder="you@email.com"/></div>
      <div style={{marginBottom:18}}><label className="lbl" style={lbl}>{t.password}</label><input type="password" style={inp} placeholder="••••••••"/></div>
      <button className="btn" style={{width:"100%",padding:"13px 16px",minHeight:46,borderRadius:11,fontWeight:600,fontSize:13,cursor:"pointer",background:p.gold,color:BTN_INK,border:"none",letterSpacing:"0.01em"}}>{t.signIn}</button>
      <div style={{textAlign:"center",marginTop:15}}><a style={{color:p.muted,fontSize:12,textDecoration:"none",cursor:"pointer",borderBottom:`1px solid ${p.border}`,paddingBottom:1}}>{t.forgot}</a></div>
      <div style={{marginTop:18,paddingTop:15,borderTop:`1px solid ${p.border}`,fontSize:11,color:p.dim,textAlign:"center"}}>{t.noAccount} <a style={{color:p.accent,fontWeight:600,textDecoration:"none",cursor:"pointer"}}>{t.contact}</a></div>
    </div>
  );
}

function Pill({ p, children, onClick, ariaLabel }) {
  return <button className="tog" onClick={onClick} aria-label={ariaLabel}
    style={{fontSize:12,padding:"10px 15px",minHeight:42,minWidth:52,borderRadius:99,...glass(p),color:p.muted,cursor:"pointer",fontWeight:600}}>{children}</button>;
}

function Landing({ mode, setMode, lang, setLang }) {
  const p = THEME[mode]; const t = T[lang]; const dark = mode==="dark";
  return (
    <div style={{minHeight:"100vh",background:p.bg,color:p.text,position:"relative",overflowX:"hidden",fontFamily:"'Plus Jakarta Sans',system-ui,sans-serif"}}>
      <div aria-hidden style={{position:"absolute",inset:0,zIndex:0,pointerEvents:"none"}}><LineField pal={p} dark={dark}/></div>
      <div aria-hidden style={{position:"fixed",top:-180,right:80,width:560,height:560,borderRadius:"50%",background:`radial-gradient(circle,${p.glowA},transparent 70%)`,filter:"blur(50px)",pointerEvents:"none",zIndex:0}}/>

      <div style={{position:"relative",zIndex:2}}>
        <header style={{padding:"24px 40px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div style={{display:"flex",alignItems:"center",gap:11}}>
            <div style={{width:34,height:34,borderRadius:10,...glass(p),display:"flex",alignItems:"center",justifyContent:"center"}}><Icon name="anchor" c={p.gold} s={19}/></div>
            <div>
              <div style={{fontWeight:700,fontSize:15,letterSpacing:"-0.01em",color:p.text,lineHeight:1}}>Golden Anchor</div>
              <div className="lbl" style={{fontSize:8,color:p.dim,marginTop:3,fontWeight:500}}>{t.advisory}</div>
            </div>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <Pill p={p} onClick={()=>setLang(lang==="en"?"es":"en")} ariaLabel="Toggle language">{lang==="en"?"ES":"EN"}</Pill>
            <Pill p={p} onClick={()=>setMode(dark?"light":"dark")} ariaLabel="Toggle theme">{dark?t.light:t.dark}</Pill>
          </div>
        </header>

        <section className="hero" style={{maxWidth:1240,margin:"0 auto",padding:"58px 40px 70px",display:"grid",gridTemplateColumns:"minmax(0,1.5fr) minmax(0,1fr)",gap:60,alignItems:"center"}}>
          <div className="rise" style={{position:"relative"}}>
            <div className="lbl" style={{display:"flex",alignItems:"center",gap:9,fontSize:9.5,color:p.gold,marginBottom:22,fontWeight:500}}>
              <span style={{width:6,height:6,borderRadius:99,background:p.gold}}/>{t.eyebrow}
            </div>
            <h1 style={{fontWeight:500,fontSize:"clamp(2.6rem,5.6vw,4.6rem)",color:p.text,lineHeight:1.04,letterSpacing:"-0.032em",margin:"0 0 26px"}}>
              {t.h1a}<span style={{fontFamily:"'Newsreader',serif",fontStyle:"italic",fontWeight:400,color:p.accent}}>{t.h1accent}</span>{t.h1b}
            </h1>
            <p style={{fontSize:17,lineHeight:1.62,color:p.muted,maxWidth:520,margin:"0 0 30px"}}>{t.sub}</p>
            <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
              {t.tags.map((s,i)=><span key={i} className="lbl" style={{fontSize:9.5,padding:"7px 13px",borderRadius:99,...glass(p),color:p.muted,fontWeight:500}}>{s}</span>)}
            </div>
            <div className="anno lbl" style={{position:"absolute",right:-30,top:4,writingMode:"vertical-rl",fontSize:8,color:p.dim,opacity:0.7,fontWeight:500}}>{t.anno}</div>
          </div>
          <div style={{display:"flex",justifyContent:"flex-end"}}><SignInCard p={p} t={t}/></div>
        </section>

        <section style={{maxWidth:1240,margin:"0 auto",padding:"30px 40px 50px",display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(260px,1fr))",gap:16}}>
          {t.features.map((f,i)=>(
            <div key={i} className="card" style={{...glass(p),borderRadius:16,padding:22}}>
              <div style={{width:40,height:40,borderRadius:11,...glass(p),display:"flex",alignItems:"center",justifyContent:"center",marginBottom:16}}><Icon name={f.icon} c={p.gold} s={19}/></div>
              <h3 style={{fontWeight:600,fontSize:15.5,color:p.text,margin:"0 0 8px",letterSpacing:"-0.01em"}}>{f.t}</h3>
              <p style={{fontSize:13,lineHeight:1.6,color:p.muted,margin:0}}>{f.b}</p>
            </div>
          ))}
        </section>

        <footer style={{maxWidth:1240,margin:"30px auto 0",padding:"22px 40px 40px",borderTop:`1px solid ${p.border}`,display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:16}}>
          <div style={{fontSize:11.5,color:p.dim,lineHeight:1.6,maxWidth:640}}>{t.disclaimer}</div>
          <div className="lbl" style={{display:"flex",gap:16,fontSize:9.5,fontWeight:500}}>
            <a href="#" style={{color:p.muted,textDecoration:"none"}}>Email</a>
            <a href="#" style={{color:p.muted,textDecoration:"none"}}>Site</a>
          </div>
        </footer>
      </div>
    </div>
  );
}

function App(){
  const [mode,setMode]=useState(()=>localStorage.getItem("ga-v3-mode")||"light");
  const [lang,setLang]=useState(()=>localStorage.getItem("ga-v3-lang")||"en");
  useEffect(()=>{localStorage.setItem("ga-v3-mode",mode);},[mode]);
  useEffect(()=>{localStorage.setItem("ga-v3-lang",lang);},[lang]);
  return <Landing mode={mode} setMode={setMode} lang={lang} setLang={setLang}/>;
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
