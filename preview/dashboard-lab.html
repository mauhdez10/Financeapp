<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Golden Anchor — Dashboard (modern)</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Newsreader:ital,opsz,wght@1,6..72,400&display=swap" rel="stylesheet"/>
<style>
  *{box-sizing:border-box;} html,body{margin:0;padding:0;} body{font-family:'Plus Jakarta Sans',system-ui,sans-serif;-webkit-font-smoothing:antialiased;}
  .mono{font-family:'JetBrains Mono',monospace;}
  .num{font-family:'Plus Jakarta Sans',system-ui,sans-serif;font-variant-numeric:tabular-nums;font-feature-settings:"tnum" 1;}
  .lbl{font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:0.12em;}
  .card{transition:transform 220ms cubic-bezier(0.23,1,0.32,1),border-color 220ms ease;}
  .card:hover{transform:translateY(-2px);}
  .row{transition:background 160ms ease;cursor:pointer;}
  .nav{transition:background 150ms ease,color 150ms ease;cursor:pointer;}
  .tog{transition:transform 150ms cubic-bezier(0.23,1,0.32,1);} .tog:active{transform:scale(0.96);}
  @media (prefers-reduced-motion:reduce){*{transition:none!important;}}
  ::placeholder{opacity:0.7;}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel">
const { useState, useEffect } = React;

// Modern fintech language (Origin-inspired): near-black / off-white, glass cards,
// clean light sans numbers, mono micro-labels, thin charts, restrained gold.
const THEME = {
  dark: {
    bg:"#0A0C10", glowA:"rgba(201,168,90,0.10)", glowB:"rgba(60,110,120,0.10)",
    card:"rgba(255,255,255,0.045)", cardHover:"rgba(255,255,255,0.16)", border:"rgba(255,255,255,0.09)",
    text:"#EDEFF2", muted:"#9AA3AF", dim:"#626B78", gold:"#CBA85A", pos:"#3DD68C", neg:"#F2766B",
    inp:"rgba(255,255,255,0.05)", navActive:"rgba(255,255,255,0.07)", shadow:"none", blur:"blur(16px)",
  },
  light: {
    bg:"#FAFAF7", glowA:"rgba(184,144,30,0.07)", glowB:"rgba(60,110,120,0.05)",
    card:"#FFFFFF", cardHover:"#E6E2D6", border:"#ECEAE3",
    text:"#16181C", muted:"#5A6270", dim:"#9AA0A8", gold:"#B8901E", pos:"#0E9F6E", neg:"#D64545",
    inp:"#FFFFFF", navActive:"#F0EDE3", shadow:"0 1px 2px rgba(20,20,16,0.04), 0 10px 30px rgba(20,20,16,0.03)", blur:"blur(0px)",
  },
};

const T = {
  en:{ nav:["Overview","Clients","Calculators","Resources","Reports"], advisory:"Financial Advisory",
       page:"Overview", greeting:"Practice", search:"Search clients",
       kpis:[["Clients","24","+3"],["Practice net worth","$4.82M","+6.1%"],["Avg. debt ratio","31%","-2 pts"],["Active plans","11","+1"]],
       c_income:"Income vs Spending", c_flow:"Cash-flow split", c_nw:"Net worth", sub6:"Last 6 months", subAgg:"Practice aggregate", subClass:"By asset class",
       light:"Light", dark:"Dark", clients:"clients", netMo:"Net / mo", debt:"Debt", nw:"Net worth", improving:"Improving",
       income:"Income", spending:"Spending", savings:"Savings", bills:"Bills" },
  es:{ nav:["Resumen","Clientes","Calculadoras","Recursos","Reportes"], advisory:"Asesoría Financiera",
       page:"Resumen", greeting:"Práctica", search:"Buscar clientes",
       kpis:[["Clientes","24","+3"],["Patrimonio total","$4.82M","+6.1%"],["Razón de deuda prom.","31%","-2 pts"],["Planes activos","11","+1"]],
       c_income:"Ingresos vs Gastos", c_flow:"Flujo de efectivo", c_nw:"Patrimonio", sub6:"Últimos 6 meses", subAgg:"Agregado de la práctica", subClass:"Por clase de activo",
       light:"Claro", dark:"Oscuro", clients:"clientes", netMo:"Neto / mes", debt:"Deuda", nw:"Patrimonio", improving:"Mejorando",
       income:"Ingresos", spending:"Gastos", savings:"Ahorro", bills:"Gastos" },
};

const NAV_ICONS = ["spark","users","calc","book","file"];
const Icon = ({ name, c, s=18 }) => {
  const P = { width:s, height:s, viewBox:"0 0 24 24", fill:"none", stroke:c, strokeWidth:1.6, strokeLinecap:"round", strokeLinejoin:"round" };
  switch(name){
    case "spark": return <svg {...P}><path d="M3 14l5-5 4 3 6-7"/><path d="M3 20h18"/></svg>;
    case "users": return <svg {...P}><circle cx="9" cy="8" r="3"/><path d="M3 20a6 6 0 0 1 12 0"/><path d="M16 6a3 3 0 0 1 0 6M21 20a6 6 0 0 0-4-5.7"/></svg>;
    case "calc":  return <svg {...P}><rect x="5" y="3" width="14" height="18" rx="2.5"/><path d="M9 7h6M9 11h.01M12 11h.01M15 11h.01M9 15h.01M12 15h.01M15 15v3"/></svg>;
    case "book":  return <svg {...P}><path d="M4 19V5a2 2 0 0 1 2-2h12v16H6a2 2 0 0 0-2 2z"/><path d="M8 7h7"/></svg>;
    case "file":  return <svg {...P}><path d="M14 3v5h5"/><path d="M19 8v11a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h7z"/><path d="M9 13h6M9 17h4"/></svg>;
    case "anchor":return <svg {...P}><circle cx="12" cy="5" r="2.2"/><path d="M12 7.2V21"/><path d="M5 13a7 7 0 0 0 14 0"/><path d="M5 13H3M19 13h2"/></svg>;
    case "arrow": return <svg {...P} strokeWidth="2"><path d="M9 6l6 6-6 6"/></svg>;
    default: return null;
  }
};

function glass(p){ return { background:p.card, border:`1px solid ${p.border}`, backdropFilter:p.blur, WebkitBackdropFilter:p.blur, boxShadow:p.shadow }; }

function Spark({ data, c, w=92, h=30 }) {
  const max=Math.max(...data), min=Math.min(...data), rng=max-min||1;
  const pts=data.map((v,i)=>`${(i/(data.length-1))*w},${h-((v-min)/rng)*(h-5)-3}`).join(" ");
  return <svg width={w} height={h} style={{display:"block",overflow:"visible"}}>
    <polyline points={pts} fill="none" stroke={c} strokeWidth="1.4" strokeLinecap="round" strokeLinejoin="round" opacity="0.85"/>
    <circle cx={w} cy={h-((data[data.length-1]-min)/rng)*(h-5)-3} r="2" fill={c}/>
  </svg>;
}

function AreaPair({ p }) {
  const inc=[60,63,61,67,69,72,71,75], spd=[47,50,48,51,54,52,55,53];
  const W=320,H=130, max=80;
  const path=(arr)=>arr.map((v,i)=>`${(i/(arr.length-1))*W},${H-(v/max)*H}`).join(" ");
  return <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",height:"auto",overflow:"visible"}}>
    <defs><linearGradient id="ig" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stopColor={p.gold} stopOpacity="0.22"/><stop offset="1" stopColor={p.gold} stopOpacity="0"/></linearGradient></defs>
    <polyline points={`0,${H} ${path(inc)} ${W},${H}`} fill="url(#ig)" stroke="none"/>
    <polyline points={path(inc)} fill="none" stroke={p.gold} strokeWidth="1.75" strokeLinecap="round" strokeLinejoin="round"/>
    <polyline points={path(spd)} fill="none" stroke={p.muted} strokeWidth="1.5" strokeDasharray="3 3" strokeLinecap="round" opacity="0.7"/>
  </svg>;
}

function SegBar({ p, t }) {
  const segs=[[t.savings,34,p.pos],[t.bills,46,p.muted],[t.debt,20,p.gold]];
  return <div style={{display:"flex",flexDirection:"column",gap:14,paddingTop:6}}>
    <div style={{display:"flex",height:12,borderRadius:99,overflow:"hidden",gap:2}}>
      {segs.map((s,i)=><div key={i} style={{width:s[1]+"%",background:s[2],opacity:i===1?0.45:0.9}}/>)}
    </div>
    <div style={{display:"flex",flexDirection:"column",gap:9}}>
      {segs.map((s,i)=><div key={i} style={{display:"flex",alignItems:"center",gap:9,fontSize:12,color:p.muted}}>
        <span style={{width:8,height:8,borderRadius:99,background:s[2],opacity:i===1?0.45:1}}/>{s[0]}
        <span className="num" style={{marginLeft:"auto",color:p.text,fontWeight:600}}>{s[1]}%</span></div>)}
    </div>
  </div>;
}

function Ring({ p }) {
  const segs=[[28,p.gold],[42,p.pos],[22,"#7FA8C9"],[8,p.dim]];
  let acc=0, cx=58, cy=58, R=46, C=2*Math.PI*R, sw=9;
  return <div style={{display:"flex",alignItems:"center",gap:18}}>
    <svg width="116" height="116" viewBox="0 0 116 116">
      <circle cx={cx} cy={cy} r={R} fill="none" stroke={p.border} strokeWidth={sw}/>
      {segs.map((s,i)=>{const frac=s[0]/100,len=frac*C,off=acc*C;acc+=frac;
        return <circle key={i} cx={cx} cy={cy} r={R} fill="none" stroke={s[1]} strokeWidth={sw} strokeDasharray={`${len} ${C-len}`} strokeDashoffset={-off} transform={`rotate(-90 ${cx} ${cy})`} strokeLinecap="round"/>;})}
      <text x={cx} y={cy-1} textAnchor="middle" className="num" fontSize="16" fontWeight="600" fill={p.text}>$4.82M</text>
      <text x={cx} y={cy+13} textAnchor="middle" className="lbl" fontSize="6.5" fill={p.dim}>NET WORTH</text>
    </svg>
    <div style={{display:"flex",flexDirection:"column",gap:8}}>
      {[["Cash",28,p.gold],["Investments",42,p.pos],["Property",22,"#7FA8C9"],["Other",8,p.dim]].map((s,i)=>
        <div key={i} style={{display:"flex",alignItems:"center",gap:8,fontSize:11.5,color:p.muted}}><span style={{width:7,height:7,borderRadius:99,background:s[2]}}/>{s[0]}<span className="num" style={{marginLeft:"auto",color:p.text,fontWeight:600}}>{s[1]}%</span></div>)}
    </div>
  </div>;
}

function Kpi({ p, label, value, delta }) {
  const down = delta.trim().startsWith("-"); const good = !down || delta.includes("pts");
  const dc = good?p.pos:p.neg;
  const spark=[5,6,5.5,7,6.5,8,9,10].map((v,i)=>v+(i%2?0.6:0));
  return <div className="card" style={{...glass(p),borderRadius:16,padding:"20px 20px 18px"}}>
    <div className="lbl" style={{fontSize:9.5,color:p.dim,fontWeight:500,marginBottom:14}}>{label}</div>
    <div style={{display:"flex",alignItems:"flex-end",justifyContent:"space-between",gap:10}}>
      <div>
        <div className="num" style={{fontSize:29,fontWeight:500,color:p.text,lineHeight:1,letterSpacing:"-0.01em"}}>{value}</div>
        <div className="num" style={{fontSize:11.5,fontWeight:600,color:dc,marginTop:9,display:"flex",alignItems:"center",gap:4}}>
          <span style={{fontSize:9}}>{good?"▲":"▼"}</span>{delta}</div>
      </div>
      <Spark data={spark} c={p.gold}/>
    </div>
  </div>;
}

function Card({ p, title, sub, children, flex }) {
  return <div className="card" style={{...glass(p),borderRadius:16,padding:20,display:"flex",flexDirection:"column",flex}}>
    <div style={{display:"flex",alignItems:"baseline",justifyContent:"space-between",marginBottom:16}}>
      <div className="lbl" style={{fontSize:10,color:p.muted,fontWeight:500}}>{title}</div>
      {sub&&<div style={{fontSize:10,color:p.dim}}>{sub}</div>}
    </div>
    {children}
  </div>;
}

const CLIENTS = [
  {n:"Amanda Chen",p:"",init:"AC",col:"#6E8BD6",net:"5,240",debt:"182K",nw:"612K",imp:true},
  {n:"Marcus Webb",p:"& Lia",init:"MW",col:"#E0935B",net:"3,910",debt:"240K",nw:"388K",imp:false},
  {n:"Sofia Reyes",p:"",init:"SR",col:"#4FB68A",net:"6,720",debt:"96K",nw:"845K",imp:true},
  {n:"David Okafor",p:"& Nia",init:"DO",col:"#A07FC9",net:"2,480",debt:"310K",nw:"210K",imp:false},
];

function Dashboard({ mode, setMode, lang, setLang }) {
  const p = THEME[mode]; const t = T[lang]; const dark = mode==="dark";
  const pill = {fontSize:12,padding:"9px 14px",minHeight:40,borderRadius:99,background:"transparent",color:p.muted,border:`1px solid ${p.border}`,cursor:"pointer",fontWeight:600};
  return <div style={{minHeight:"100vh",background:p.bg,color:p.text,display:"flex",fontFamily:"'Plus Jakarta Sans',system-ui,sans-serif",position:"relative",overflow:"hidden"}}>
    {/* atmospheric glow so glass reads */}
    <div aria-hidden style={{position:"fixed",top:-160,right:120,width:560,height:560,borderRadius:"50%",background:`radial-gradient(circle,${p.glowA},transparent 70%)`,filter:"blur(40px)",pointerEvents:"none"}}/>
    <div aria-hidden style={{position:"fixed",bottom:-200,left:120,width:560,height:560,borderRadius:"50%",background:`radial-gradient(circle,${p.glowB},transparent 70%)`,filter:"blur(50px)",pointerEvents:"none"}}/>

    {/* SIDEBAR */}
    <aside style={{width:228,flexShrink:0,padding:"26px 16px",display:"flex",flexDirection:"column",minHeight:"100vh",borderRight:`1px solid ${p.border}`,position:"relative",zIndex:2}}>
      <div style={{display:"flex",alignItems:"center",gap:10,padding:"0 8px 26px"}}>
        <div style={{width:32,height:32,borderRadius:10,...glass(p),display:"flex",alignItems:"center",justifyContent:"center"}}><Icon name="anchor" c={p.gold} s={18}/></div>
        <div style={{fontWeight:700,fontSize:15,letterSpacing:"-0.01em",color:p.text}}>Golden Anchor</div>
      </div>
      <nav style={{display:"flex",flexDirection:"column",gap:2}}>
        {t.nav.map((label,i)=>{const active=i===0;
          return <div key={i} className="nav" style={{display:"flex",alignItems:"center",gap:12,padding:"10px 12px",borderRadius:11,
            background:active?p.navActive:"transparent",color:active?p.text:p.muted,fontWeight:active?600:500,fontSize:13.5}}>
            <Icon name={NAV_ICONS[i]} c={active?p.gold:p.dim} s={18}/>{label}
            {active&&<span style={{marginLeft:"auto",width:5,height:5,borderRadius:99,background:p.gold}}/>}
          </div>;})}
      </nav>
      <div style={{marginTop:"auto",display:"flex",alignItems:"center",gap:10,padding:"12px",borderRadius:12,...glass(p)}}>
        <div className="num" style={{width:32,height:32,borderRadius:99,background:p.gold+"22",border:`1px solid ${p.gold}55`,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:600,fontSize:12,color:p.gold}}>MH</div>
        <div style={{fontSize:12}}><div style={{fontWeight:600,color:p.text}}>Mauricio H.</div><div style={{fontSize:10,color:p.dim}}>Advisor</div></div>
      </div>
    </aside>

    {/* MAIN */}
    <main style={{flex:1,minWidth:0,padding:"28px 36px 44px",position:"relative",zIndex:2}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:16,marginBottom:28,flexWrap:"wrap"}}>
        <div>
          <div className="lbl" style={{fontSize:10,color:p.gold,fontWeight:500,marginBottom:8}}>{t.greeting}</div>
          <h1 style={{fontSize:32,fontWeight:600,letterSpacing:"-0.025em",color:p.text,margin:0,lineHeight:1}}>{t.page}</h1>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{display:"flex",alignItems:"center",gap:8,...glass(p),borderRadius:99,padding:"9px 16px"}}>
            <Icon name="spark" c={p.dim} s={14}/>
            <input placeholder={t.search} style={{background:"transparent",border:"none",color:p.text,fontSize:12.5,width:160,outline:"none",fontFamily:"inherit"}}/>
          </div>
          <button className="tog" onClick={()=>setLang(lang==="en"?"es":"en")} style={pill}>{lang==="en"?"ES":"EN"}</button>
          <button className="tog" onClick={()=>setMode(dark?"light":"dark")} style={pill}>{dark?t.light:t.dark}</button>
        </div>
      </div>

      {/* KPI strip */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(200px,1fr))",gap:14,marginBottom:16}}>
        {t.kpis.map((k,i)=><Kpi key={i} p={p} label={k[0]} value={k[1]} delta={k[2]}/>)}
      </div>

      {/* chart row */}
      <div style={{display:"grid",gridTemplateColumns:"minmax(0,1.35fr) minmax(0,1fr) minmax(0,1.1fr)",gap:14,marginBottom:16}}>
        <Card p={p} title={t.c_income} sub={t.sub6}>
          <AreaPair p={p}/>
          <div style={{display:"flex",gap:18,marginTop:14,fontSize:11.5,color:p.muted}}>
            <span style={{display:"flex",alignItems:"center",gap:7}}><span style={{width:14,height:2,borderRadius:2,background:p.gold}}/>{t.income}</span>
            <span style={{display:"flex",alignItems:"center",gap:7}}><span style={{width:14,height:0,borderTop:`2px dashed ${p.muted}`}}/>{t.spending}</span>
          </div>
        </Card>
        <Card p={p} title={t.c_flow} sub={t.subAgg}><SegBar p={p} t={t}/></Card>
        <Card p={p} title={t.c_nw} sub={t.subClass}><Ring p={p}/></Card>
      </div>

      {/* client list */}
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
        <span className="lbl" style={{fontSize:10,color:p.dim}}>24 {t.clients}</span>
        <span style={{flex:1,height:1,background:p.border}}/>
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:8}}>
        {CLIENTS.map((c,i)=><div key={i} className="row card" style={{...glass(p),borderRadius:14,padding:"14px 18px",display:"flex",alignItems:"center",gap:16}}>
          <div className="num" style={{width:40,height:40,borderRadius:99,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:600,fontSize:12.5,background:c.col+"26",color:c.col,border:`1px solid ${c.col}44`,flexShrink:0}}>{c.init}</div>
          <div style={{flex:1,minWidth:0}}>
            <div style={{display:"flex",alignItems:"center",gap:9}}>
              <span style={{fontSize:14,fontWeight:600,color:p.text}}>{c.n}</span>{c.p&&<span style={{fontSize:12,color:p.dim}}>{c.p}</span>}
              {c.imp&&<span className="lbl" style={{fontSize:8.5,fontWeight:600,color:p.pos,background:p.pos+"18",border:`1px solid ${p.pos}40`,padding:"2px 8px",borderRadius:99}}>{t.improving}</span>}
            </div>
            <div style={{fontSize:11,color:p.dim,marginTop:3}}>{c.n.toLowerCase().replace(" ",".")}@email.com</div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:26,textAlign:"right"}}>
            <div><div className="lbl" style={{fontSize:8.5,color:p.dim,marginBottom:4}}>{t.netMo}</div><div className="num" style={{fontSize:13.5,fontWeight:600,color:p.pos}}>${c.net}</div></div>
            <div><div className="lbl" style={{fontSize:8.5,color:p.dim,marginBottom:4}}>{t.debt}</div><div className="num" style={{fontSize:13.5,fontWeight:600,color:p.neg}}>${c.debt}</div></div>
            <div><div className="lbl" style={{fontSize:8.5,color:p.dim,marginBottom:4}}>{t.nw}</div><div className="num" style={{fontSize:13.5,fontWeight:600,color:p.gold}}>${c.nw}</div></div>
          </div>
          <Icon name="arrow" c={p.dim} s={16}/>
        </div>)}
      </div>
    </main>
  </div>;
}

function App(){
  const [mode,setMode]=useState(()=>localStorage.getItem("ga-dash2-mode")||"light");
  const [lang,setLang]=useState(()=>localStorage.getItem("ga-dash2-lang")||"en");
  useEffect(()=>{localStorage.setItem("ga-dash2-mode",mode);},[mode]);
  useEffect(()=>{localStorage.setItem("ga-dash2-lang",lang);},[lang]);
  return <Dashboard mode={mode} setMode={setMode} lang={lang} setLang={setLang}/>;
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
