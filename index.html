<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=5" />

    <title>Golden Anchor Finance</title>
    <meta name="description" content="Personal financial advisory portal — Golden Anchor Financial Advisory." />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0D1B2A" />
    <meta name="color-scheme" content="dark light" />

    <!-- iOS / Safari -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Golden Anchor" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- Favicons (v0.15.0: SVG monogram primary; PNGs kept as fallback for legacy browsers) -->
    <link rel="icon" type="image/svg+xml" href="/anchor-monogram.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />

    <!-- Brand fonts: Newsreader (wordmark + report titles), Plus Jakarta Sans (body sans),
         Source Serif 4 (printed body), JetBrains Mono (currency columns). All free Google Fonts. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400;1,6..72,500&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;1,8..60,400&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&display=swap" />

    <!-- Service worker registration. Wrapped in a try/catch so a SW failure never
         blocks the app from booting. Re-checks for updates on every load. -->
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", function () {
          navigator.serviceWorker
            .register("/sw.js", { scope: "/" })
            .then(function (reg) {
              // Force update check on each load so post-deploy fetches the new SW.
              reg.update().catch(function () {});
              // When a new SW is waiting, kick it active immediately on next navigation.
              if (reg.waiting) {
                reg.waiting.postMessage({ type: "SKIP_WAITING" });
              }
              reg.addEventListener("updatefound", function () {
                var sw = reg.installing;
                if (sw) {
                  sw.addEventListener("statechange", function () {
                    if (sw.state === "installed" && navigator.serviceWorker.controller) {
                      sw.postMessage({ type: "SKIP_WAITING" });
                    }
                  });
                }
              });
            })
            .catch(function (err) {
              console.warn("[ga] SW register failed:", err);
            });
        });
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
